<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockPrep Gallery</title>
    <link rel="stylesheet" href="/static/styles.css?v=4">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">SP</span>
          <div>
            <h1>StockPrep</h1>
            <p id="summary">Galeria local</p>
          </div>
        </div>

        <section class="metric-stack" aria-label="Resumen">
          <div>
            <span id="metricTotal">0</span>
            <small>imagenes</small>
          </div>
          <div>
            <span id="metricProcessed">0</span>
            <small>procesadas</small>
          </div>
          <div>
            <span id="metricThumbs">0</span>
            <small>miniaturas</small>
          </div>
        </section>

        <section class="filter-panel">
          <h2>Filtros</h2>
          <label>
            <span>Formato</span>
            <select id="formatFilter">
              <option value="">Todos</option>
            </select>
          </label>
          <label>
            <span>Estado</span>
            <select id="stateFilter">
              <option value="">Todos</option>
              <option value="completed">Completadas</option>
              <option value="pending">Pendientes</option>
              <option value="processing">Procesando</option>
              <option value="error">Errores</option>
            </select>
          </label>
        </section>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">Catalogo IA</p>
            <h2 id="resultTitle">Galeria</h2>
          </div>
          <form id="searchForm" class="search">
            <input id="searchInput" type="search" autocomplete="off" placeholder="Buscar por caption, keyword, objeto o nombre">
            <button type="submit" aria-label="Buscar">
              <span aria-hidden="true">⌕</span>
            </button>
          </form>
        </header>

        <section id="grid" class="grid" aria-live="polite"></section>
        <div id="emptyState" class="empty" hidden>No hay resultados</div>

        <footer class="pager">
          <button id="prevPage" type="button" aria-label="Pagina anterior">‹</button>
          <span id="pageInfo">1 / 1</span>
          <button id="nextPage" type="button" aria-label="Pagina siguiente">›</button>
        </footer>
      </main>
    </div>

    <aside id="detail" class="detail" aria-hidden="true">
      <div class="detail-panel">
        <div class="preview">
          <img id="detailImage" alt="">
        </div>
        <div class="detail-body">
          <div class="detail-head">
            <h2 id="detailName"></h2>
            <button id="closeDetail" class="close" type="button" aria-label="Cerrar">×</button>
          </div>
          <p id="detailCaption"></p>
          <div class="actions">
            <button id="copyCaption" type="button">Copiar caption</button>
            <button id="copyKeywords" type="button">Copiar keywords</button>
            <a id="openOriginal" target="_blank" rel="noreferrer">Abrir imagen</a>
          </div>
          <dl id="detailMeta" class="meta"></dl>
          <div id="keywords" class="keywords"></div>
        </div>
      </div>
    </aside>

    <script src="/static/app.js?v=4"></script>
  </body>
</html>
